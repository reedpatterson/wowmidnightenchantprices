<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WoW Midnight — Crafting Prices</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Midnight Crafting Prices</h1>
      <div class="controls">
        <label for="realm-select">Realm</label>
        <select id="realm-select"></select>
        <button id="toggle-no-data" class="toggle-btn" aria-pressed="false">Hide no-data</button>
      </div>
      <div class="theme-picker">
        <label>Theme</label>
        <div class="swatches">
          <button class="swatch" data-theme="midnight" title="Midnight" aria-pressed="false"></button>
          <button class="swatch" data-theme="arcane"   title="Arcane"   aria-pressed="false"></button>
          <button class="swatch" data-theme="verdant"  title="Verdant"  aria-pressed="false"></button>
          <button class="swatch" data-theme="ember"    title="Ember"    aria-pressed="false"></button>
          <button class="swatch" data-theme="frost"    title="Frost"    aria-pressed="false"></button>
        </div>
      </div>
      <span id="last-updated"></span>
      <nav class="profession-nav" id="profession-nav"></nav>
    </header>

    <main id="content">
      <p class="loading">Loading prices...</p>
    </main>

    <script>
      let appConfig = { region: "us", defaultRealm: "stormrage", realms: ["stormrage"] };
      let activeProfession = localStorage.getItem("profession") || "All";
      let hideNoData = localStorage.getItem("hideNoData") === "true";

      // ── Helpers ─────────────────────────────────────────────────────────────

      function formatPrice(price) {
        if (!price) return '<span class="no-price">—</span>';
        const parts = [];
        if (price.gold > 0)   parts.push(`<span class="gold">${price.gold.toLocaleString()}g</span>`);
        if (price.silver > 0) parts.push(`<span class="silver">${price.silver}s</span>`);
        if (price.copper > 0) parts.push(`<span class="copper">${price.copper}c</span>`);
        return parts.length ? parts.join(" ") : '<span class="no-price">0c</span>';
      }

      function formatProfit(price) {
        if (!price) return '<span class="no-price">—</span>';
        const sign = price.total > 0 ? "+" : price.total < 0 ? "−" : "";
        const abs = { ...price, total: Math.abs(price.total), gold: Math.abs(price.gold) };
        const cls = price.total > 0 ? "positive" : price.total < 0 ? "negative" : "neutral";
        return `<span class="${cls}">${sign}${stripFormatPrice(abs)}</span>`;
      }

      function stripFormatPrice(price) {
        const parts = [];
        if (price.gold > 0)   parts.push(`${price.gold.toLocaleString()}g`);
        if (price.silver > 0) parts.push(`${price.silver}s`);
        if (price.copper > 0) parts.push(`${price.copper}c`);
        return parts.length ? parts.join(" ") : "0c";
      }

      function materialsPopover(materials) {
        if (!materials || materials.length === 0) return "";
        const rows = materials.map((m) => `
          <div class="mat-row">
            ${m.icon ? `<img src="${m.icon}" alt="" class="mat-icon">` : `<span class="mat-icon-placeholder"></span>`}
            <span class="mat-name">${m.qty}× ${m.name}</span>
            <span class="mat-price">${m.totalCost ? stripFormatPrice(m.totalCost) : "—"}</span>
          </div>`).join("");
        return `<div class="mat-popover">${rows}</div>`;
      }

      // ── Profession tabs ──────────────────────────────────────────────────────

      function applyProfession(profession) {
        activeProfession = profession;
        document.querySelectorAll(".profession-tab").forEach((btn) => {
          btn.setAttribute("aria-pressed", btn.dataset.profession === profession ? "true" : "false");
        });
        document.querySelectorAll(".profession-section").forEach((section) => {
          section.hidden = profession !== "All" && section.dataset.profession !== profession;
        });
        localStorage.setItem("profession", profession);
      }

      function renderProfessionTabs(professions) {
        const nav = document.getElementById("profession-nav");
        nav.innerHTML = ["All", ...professions]
          .map((p) => `<button class="profession-tab" data-profession="${p}" aria-pressed="false">${p}</button>`)
          .join("");
        nav.querySelectorAll(".profession-tab").forEach((btn) => {
          btn.addEventListener("click", () => applyProfession(btn.dataset.profession));
        });
      }

      // ── Table sort ───────────────────────────────────────────────────────────

      function initTableSort(table) {
        let activeCol = null;
        let sortDir = 1;
        table.querySelectorAll("th[data-col]").forEach((th) => {
          th.addEventListener("click", () => {
            const col = parseInt(th.dataset.col);
            if (activeCol === col) {
              sortDir = -sortDir;
            } else {
              activeCol = col;
              sortDir = th.dataset.sortType === "string" ? 1 : -1;
            }
            table.querySelectorAll("th[data-col]").forEach((h) => {
              h.dataset.sortDir = h === th ? (sortDir === 1 ? "asc" : "desc") : "";
            });
            const tbody = table.querySelector("tbody");
            const rows = [...tbody.querySelectorAll("tr")];
            rows.sort((a, b) => {
              const aVal = a.cells[col]?.dataset.sort ?? "";
              const bVal = b.cells[col]?.dataset.sort ?? "";
              if (th.dataset.sortType === "string") return sortDir * aVal.localeCompare(bVal);
              return sortDir * (parseFloat(aVal) - parseFloat(bVal));
            });
            rows.forEach((r) => tbody.appendChild(r));
          });
        });
      }

      // ── Hide no-data ─────────────────────────────────────────────────────────

      function applyHideNoData() {
        document.querySelectorAll('tr[data-no-data="true"]').forEach((row) => {
          row.hidden = hideNoData;
        });
        const btn = document.getElementById("toggle-no-data");
        if (btn) btn.setAttribute("aria-pressed", hideNoData ? "true" : "false");
      }

      // ── Render ───────────────────────────────────────────────────────────────

      function renderItemRow(item) {
        const profitPct = item.materialCostTotal && item.profitPerCraft && item.materialCostTotal.total !== 0
          ? Math.round(item.profitPerCraft.total / item.materialCostTotal.total * 100)
          : null;
        const profitClass = item.profitPerCraft
          ? (item.profitPerCraft.total > 0 ? "profit-pos" : item.profitPerCraft.total < 0 ? "profit-neg" : "")
          : "";
        const noData = !item.craft.price ? 'data-no-data="true"' : "";
        const pctHtml = profitPct !== null
          ? `<span class="${profitPct > 0 ? 'positive' : profitPct < 0 ? 'negative' : 'neutral'}">${profitPct > 0 ? '+' : ''}${profitPct}%</span>`
          : '<span class="no-price">—</span>';
        return `
          <tr class="${profitClass}" ${noData}>
            <td class="item-name" data-sort="${item.name}">${item.name}</td>
            <td class="price" data-sort="${item.recipe.price?.total ?? -1}">${formatPrice(item.recipe.price)}${item.recipe.available ? `<span class="available"> ×${item.recipe.available}</span>` : ""}</td>
            <td class="price mat-cost" data-sort="${item.materialCostTotal?.total ?? -1}">${formatPrice(item.materialCostTotal)}${materialsPopover(item.materials)}</td>
            <td class="price" data-sort="${item.craft.price?.total ?? -1}">
              ${formatPrice(item.craft.price)}${item.craft.available ? `<span class="available"> ×${item.craft.available}</span>` : ""}
              ${item.craft.priceR2 ? `<div class="price-r2">✦ ${formatPrice(item.craft.priceR2)}${item.craft.availableR2 ? `<span class="available"> ×${item.craft.availableR2}</span>` : ""}</div>` : ""}
            </td>
            <td class="price" data-sort="${item.profitPerCraft?.total ?? -2147483648}">${formatProfit(item.profitPerCraft)}</td>
            <td class="price" data-sort="${profitPct ?? -2147483648}">${pctHtml}</td>
            <td class="price break-even" data-sort="${item.breakEven ?? 2147483647}">${item.breakEven !== null ? item.breakEven : '<span class="no-price">—</span>'}</td>
          </tr>`;
      }

      function renderPrices(data) {
        const updated = document.getElementById("last-updated");
        if (data.lastUpdated) {
          updated.textContent = `Updated ${new Date(data.lastUpdated).toLocaleString()}`;
        }

        // Group by profession, then by category within each profession
        const byProfession = {};
        for (const item of data.items) {
          const prof = item.profession || "Other";
          if (!byProfession[prof]) byProfession[prof] = {};
          if (!byProfession[prof][item.category]) byProfession[prof][item.category] = [];
          byProfession[prof][item.category].push(item);
        }

        const professions = Object.keys(byProfession);
        renderProfessionTabs(professions);

        const TABLE_HEAD = `
          <thead>
            <tr>
              <th data-col="0" data-sort-type="string">Item</th>
              <th data-col="1" data-sort-type="number" title="One-time cost to learn the recipe">Recipe Price</th>
              <th data-col="2" data-sort-type="number" title="AH cost of materials per craft (hover for breakdown)">Mat Cost/Craft</th>
              <th data-col="3" data-sort-type="number" title="Lowest AH price — ×N = listings available">Sell Price</th>
              <th data-col="4" data-sort-type="number" title="Sell price (after 5% AH cut) minus material cost">Profit/Craft</th>
              <th data-col="5" data-sort-type="number" title="Profit as a percentage of material cost">Profit %</th>
              <th data-col="6" data-sort-type="number" title="Number of crafts to sell before the recipe pays for itself">Break-even</th>
            </tr>
          </thead>`;

        let html = "";
        for (const [profession, byCategory] of Object.entries(byProfession)) {
          html += `<div class="profession-section" data-profession="${profession}">`;
          for (const [category, items] of Object.entries(byCategory)) {
            html += `
              <section>
                <h2>${category}</h2>
                <table>${TABLE_HEAD}<tbody>
                  ${items.map(renderItemRow).join("")}
                </tbody></table>
              </section>`;
          }
          html += `</div>`;
        }

        document.getElementById("content").innerHTML =
          html || '<p class="no-data">No price data available for this realm yet.</p>';

        document.querySelectorAll("table").forEach(initTableSort);

        // Re-apply active filters after re-render
        applyProfession(activeProfession);
        applyHideNoData();
      }

      // ── Load ─────────────────────────────────────────────────────────────────

      async function loadPrices(realmSlug) {
        document.getElementById("content").innerHTML = '<p class="loading">Loading prices...</p>';
        document.getElementById("last-updated").textContent = "";
        try {
          const res = await fetch(`data/prices/${realmSlug}.json?_=${Date.now()}`);
          if (!res.ok) throw new Error(`No price data found for "${realmSlug}".`);
          renderPrices(await res.json());
        } catch (err) {
          document.getElementById("content").innerHTML = `<p class="error">${err.message}</p>`;
        }
      }

      // ── Theme ────────────────────────────────────────────────────────────────

      const THEMES = ["midnight", "arcane", "verdant", "ember", "frost"];

      function applyTheme(theme) {
        if (!THEMES.includes(theme)) theme = "midnight";
        document.documentElement.setAttribute("data-theme", theme);
        document.querySelectorAll(".swatch").forEach((btn) => {
          btn.setAttribute("aria-pressed", btn.dataset.theme === theme ? "true" : "false");
        });
        localStorage.setItem("theme", theme);
      }

      // ── Init ─────────────────────────────────────────────────────────────────

      async function init() {
        applyTheme(localStorage.getItem("theme") || "midnight");

        document.querySelectorAll(".swatch").forEach((btn) => {
          btn.addEventListener("click", () => applyTheme(btn.dataset.theme));
        });

        document.getElementById("toggle-no-data").addEventListener("click", () => {
          hideNoData = !hideNoData;
          localStorage.setItem("hideNoData", hideNoData);
          applyHideNoData();
        });

        try {
          appConfig = await (await fetch("config.json")).json();
        } catch {}

        const select = document.getElementById("realm-select");
        for (const realm of appConfig.realms) {
          const opt = document.createElement("option");
          opt.value = realm;
          opt.textContent = realm.split("-").map((w) => w[0].toUpperCase() + w.slice(1)).join(" ");
          if (realm === appConfig.defaultRealm) opt.selected = true;
          select.appendChild(opt);
        }

        select.addEventListener("change", () => loadPrices(select.value));
        loadPrices(appConfig.defaultRealm);
      }

      init();
    </script>
  </body>
</html>
